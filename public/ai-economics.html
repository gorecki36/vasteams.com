// ─────────────────────────────────────────────────────────────────
// The Three Phases
// ─────────────────────────────────────────────────────────────────
function ThreePhases() {
  const [hover, setHover] = useState(1);

  // Three-line curve: Cost always rises (slowing in P3), Realized value lags then catches up,
  // Perceived value peaks in P1 (enthusiasm), dips in P2 (disillusionment), converges in P3.
  const curveData = Array.from({ length: 60 }, (_, i) => {
    const t = i / 59;

    let cost;
    if (t < 0.3) {
      cost = 5 + (t / 0.3) * 10;                              // 5 → 15
    } else if (t < 0.7) {
      cost = 15 + Math.pow((t - 0.3) / 0.4, 1.4) * 60;        // 15 → 75 (steep)
    } else {
      cost = 75 + ((t - 0.7) / 0.3) * 25;                     // 75 → 100 (still rising, slower)
    }

    let realized;
    if (t < 0.3) {
      realized = 3 + (t / 0.3) * 7;                           // 3 → 10
    } else if (t < 0.7) {
      realized = 10 + ((t - 0.3) / 0.4) * 20;                 // 10 → 30 (slow)
    } else {
      realized = 30 + Math.pow((t - 0.7) / 0.3, 0.75) * 65;   // 30 → 95 (catches up)
    }

    let perceived;
    if (t < 0.3) {
      perceived = 30 + (t / 0.3) * 30;                        // 30 → 60 (enthusiasm)
    } else if (t < 0.7) {
      perceived = 60 - ((t - 0.3) / 0.4) * 25;                // 60 → 35 (disillusionment)
    } else {
      perceived = 35 + ((t - 0.7) / 0.3) * 55;                // 35 → 90 (converges with realized)
    }

    return { t: i, cost, realized, perceived };
  });

  return (
    <section style={{ padding: '80px 0', borderTop: `1px solid ${C.hair}` }}>
      <Eyebrow num="04">The Three Phases</Eyebrow>

      <div style={{
        display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64,
        alignItems: 'start',
      }} className="phases-grid">

        <div>
          <h2 style={{
            fontFamily: FF_DISPLAY, fontWeight: 500, fontSize: 36,
            lineHeight: 1.05, color: C.ink, letterSpacing: '-0.025em',
            margin: 0, fontVariationSettings: '"opsz" 96',
          }}>
            Every enterprise moves through<br />three phases. Most are stuck<br />in the second.
          </h2>

          <p style={{
            fontFamily: FF_BODY, fontSize: 16, lineHeight: 1.65,
            color: C.inkSoft, marginTop: 28, maxWidth: 500,
          }}>
            §04 shows what cost does <em>by default</em>: it keeps compounding as
            the AI footprint expands. Underneath that trajectory sits an
            organizational shape: three phases every company moves through.
            Phase 2 is where most companies are stuck<Cite n={[1, 3]} />: usage
            scales faster than measurement, and cost outruns realized value.
            Phase 3 isn't a different cost curve baked into the world. It's
            what happens when an organization decides to intervene.
          </p>

          <div style={{ marginTop: 40, height: 320 }}>
            <ResponsiveContainer>
              <ComposedChart data={curveData} margin={{ top: 10, right: 20, bottom: 30, left: 0 }}>
                <defs>
                  <linearGradient id="costGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={C.ox} stopOpacity={0.18} />
                    <stop offset="100%" stopColor={C.ox} stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid stroke={C.hairSoft} vertical={false} />
                <XAxis dataKey="t" hide />
                <YAxis hide domain={[0, 110]} />
                <ReferenceLine x={18} stroke={C.hair} strokeDasharray="3 3" />
                <ReferenceLine x={42} stroke={C.hair} strokeDasharray="3 3" />
                <Area
                  type="monotone" dataKey="cost"
                  stroke="none" fill="url(#costGrad)"
                />
                <Line
                  type="monotone" dataKey="cost" stroke={C.ox}
                  strokeWidth={2.5} dot={false} name="Cost"
                />
                <Line
                  type="monotone" dataKey="realized" stroke={C.sage}
                  strokeWidth={2.5} dot={false} name="Realized value"
                />
                <Line
                  type="monotone" dataKey="perceived" stroke={C.ochre}
                  strokeWidth={1.5} dot={false} name="Perceived value"
                  strokeDasharray="4 4"
                />
              </ComposedChart>
            </ResponsiveContainer>
            <div style={{
              display: 'flex', justifyContent: 'space-around', marginTop: -20,
              fontFamily: FF_MONO, fontSize: 10, color: C.muted,
              letterSpacing: '0.12em', textTransform: 'uppercase',
            }}>
              <span>Phase 1</span>
              <span>Phase 2 · Valley</span>
              <span>Phase 3</span>
            </div>
          </div>

          <div style={{
            display: 'flex', gap: 20, marginTop: 16, flexWrap: 'wrap',
            fontFamily: FF_MONO, fontSize: 11, color: C.inkSoft,
          }}>
            <span><span style={{
              display: 'inline-block', width: 14, height: 2,
              background: C.ox, marginRight: 8, verticalAlign: 'middle',
            }} />Cost</span>
            <span><span style={{
              display: 'inline-block', width: 14, height: 2,
              background: C.sage, marginRight: 8, verticalAlign: 'middle',
            }} />Realized value</span>
            <span><span style={{
              display: 'inline-block', width: 14, height: 2,
              background: C.ochre, marginRight: 8, verticalAlign: 'middle',
              borderTop: `2px dashed ${C.ochre}`, borderBottom: 'none',
            }} />Perceived value</span>
          </div>

          <p style={{
            fontFamily: FF_BODY, fontSize: 13, color: C.muted,
            marginTop: 20, lineHeight: 1.6, fontStyle: 'italic',
          }}>
            Phase 1: enthusiasm runs ahead of reality. Phase 2: cost overshoots
            both perceived and realized value. Phase 3: cost still grows, but
            in proportion to the revenue or outcomes it creates, because the
            organization has started choosing what AI should do, rather than
            letting every workload run on the default model.
          </p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {PHASES.map((p) => {
            const active = hover === p.n;
            return (
              <div
                key={p.n}
                onMouseEnter={() => setHover(p.n)}
                style={{
                  padding: '28px 0',
                  borderTop: `1px solid ${C.hair}`,
                  borderBottom: p.n === 3 ? `1px solid ${C.hair}` : 'none',
                  cursor: 'pointer',
                  opacity: active ? 1 : 0.55,
                  transition: 'opacity 0.25s ease',
                }}
              >
                <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, marginBottom: 12 }}>
                  <span style={{
                    fontFamily: FF_DISPLAY, fontSize: 48, fontWeight: 500,
